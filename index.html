<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <title>KasirKu POS</title>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered:', reg))
            .catch(err => console.error('SW failed:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Fix for "TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // This often happens in sandboxed environments when a polyfill or library tries to overwrite window.fetch
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get: () => originalFetch,
          set: (v) => { console.warn('Something tried to overwrite fetch, blocked.'); },
          configurable: true
        });
      } catch (e) {
        console.error('Failed to patch fetch:', e);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
